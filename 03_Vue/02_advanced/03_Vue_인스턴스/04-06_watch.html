<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-model.lazy="name" placeholder="이름을 입력하세요" />
      <br />
      <input v-model.lazy="user.age" placeholder="나이를 입력하세요" />
      <br />
      <input v-model.lazy="user.email" placeholder="이메일을 입력하세요" />
      <br />
    </div>

    <script>
      const { createApp, ref, watch } = Vue;

      createApp({
        setup() {
          const name = ref('');
          const user = ref({
            age: 0,
            email: '',
          });

          // watch
          // 반응형 데이터가 변경될때 실행
          // 데이터 변경에 따른 부가적인 작업을 할때 사용 (알림, 로깅, ..)
          watch(name, (newVal, oldVal) => {
            console.log(`이름이 "${oldVal}"에서 "${newVal}"로 변경됨`);
          });

          //   // 객체를 deep을 사용해서 감시할경우 newVal, oldVal가 동일한 Proxy객체를 참조함.
          //   watch(
          //     user,
          //     (newVal, oldVal) => {
          //       console.log(
          //         `기존 사용자 : ${oldVal.age} , ${oldVal.email} -> 변경된 사용자 : ${newVal.age}, ${newVal.email}`,
          //       );
          //     },
          //     {
          //       deep: true, // 객체 내부속성까지 감시
          //     },
          //   );

          watch(
            // 1. user.value를 복사해서 반환 (참조가 아닌 스냅샷 전달)
            () => ({ ...user.value }),
            (newVal, oldVal) => {
              console.log(
                `기존 사용자 : ${oldVal.age}, ${oldVal.email} -> 변경된 사용자 : ${newVal.age}, ${newVal.email}`,
              );
            },
            { deep: true }, // 2. 객체 내부의 속성 변경을 감시하기 위해 필수!
          );
          return {
            user,
            name,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
