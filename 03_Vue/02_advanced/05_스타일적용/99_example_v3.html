<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 토글</title>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>

      <!-- 작성 영역 (CSS 추가 없이 인라인 스타일 활용) -->
      <div style="text-align: center; margin-bottom: 20px">
        <input
          type="text"
          v-model="newPost.title"
          placeholder="새 게시글 제목"
          style="padding: 5px; margin-right: 5px"
        />
        <input
          type="text"
          v-model="newPost.content"
          placeholder="새 게시글 내용"
          style="padding: 5px; margin-right: 5px"
        />
        <button @click="addPost">작성</button>
      </div>

      <ul>
        <li v-for="post in sortedPosts" :key="post.no" class="post-item-wrapper">
          <div @click="togglePost(post.no)" class="post-item">
            {{ post.no }}. {{ post.title }}
            <span class="arrow"
              >{{ selectedPostNo === post.no ? '▲' : '▼' }}</span
            >
          </div>

          <div v-if="selectedPostNo === post.no" class="post-content">
            <!-- 1. 수정 모드 -->
            <div v-if="editingPostNo === post.no">
              <input
                type="text"
                v-model="editPost.title"
                placeholder="제목"
                style="
                  width: 100%;
                  box-sizing: border-box;
                  margin-bottom: 5px;
                  padding: 5px;
                "
              />
              <textarea
                v-model="editPost.content"
                placeholder="내용"
                style="width: 100%; box-sizing: border-box; padding: 5px"
                rows="3"
              ></textarea>
              <br />
              <button @click="saveEdit(post.no)">저장</button>
              <button @click="cancelEdit">취소</button>
            </div>

            <!-- 2. 읽기 모드 -->
            <div v-else>
              <h2>{{ post.title }}</h2>
              <p>{{ post.content }}</p>
              <button @click="startEdit(post)">수정</button>
              <button @click="deletePost(post.no)">삭제</button>
              <button @click="closePost">닫기</button>
            </div>
          </div>
        </li>
      </ul>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const posts = ref([
            {
              no: 1,
              title: "Vue.js 기초 배우기",
              content:
                "Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.",
            },
            {
              no: 2,
              title: "자바스크립트 ES6 문법",
              content:
                "ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수 등을 제공합니다.",
            },
            {
              no: 3,
              title: "Node.js와 Express",
              content:
                "Node.js는 서버 측 런타임이며, Express는 웹 프레임워크입니다.",
            },
            {
              no: 4,
              title: "MongoDB 기본 개념",
              content:
                "MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장합니다.",
            },
            {
              no: 5,
              title: "프론트엔드와 백엔드의 차이",
              content:
                "프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.",
            },
            {
              no: 6,
              title: "비동기 프로그래밍",
              content:
                "JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.",
            },
            {
              no: 7,
              title: "Vue Router 사용법",
              content:
                "Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.",
            },
            {
              no: 8,
              title: "컴포넌트 기반 개발",
              content:
                "Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.",
            },
            {
              no: 9,
              title: "CSS와 SCSS 차이점",
              content:
                "SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.",
            },
            {
              no: 10,
              title: "Git과 GitHub 사용법",
              content:
                "Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.",
            },
          ]);

          // 항상 no 기준 내림차순 정렬된 게시글 목록 반환 (번호가 큰 최신글이 먼저 보이도록 함)
          // 만약 번호가 작은 순(1,2,3...)을 원하시면 (b.no - a.no)를 (a.no - b.no)로 변경하세요.
          const sortedPosts = computed(() => {
            return [...posts.value].sort((a, b) => b.no - a.no);
          });

          // 신규 작성용 및 수정용 상태
          const newPost = ref({ title: "", content: "" });
          const editingPostNo = ref(null);
          const editPost = ref({ title: "", content: "" });

          // 선택된 게시글의 번호를 저장
          const selectedPostNo = ref(null);

          const togglePost = (no) => {
            selectedPostNo.value = selectedPostNo.value === no ? null : no;
            // 다른 게시글 열 때는 기존 수정모드 초기화
            if (selectedPostNo.value !== editingPostNo.value) {
              editingPostNo.value = null;
            }
          };

          const closePost = () => {
            selectedPostNo.value = null;
            editingPostNo.value = null;
          };

          // 1. 게시글 추가
          const addPost = () => {
            // if (!newPost.value.title.trim() || !newPost.value.content.trim()) {
            //   alert("제목과 내용을 모두 입력해주세요!");
            //   return;
            // }
            const newNo =
              posts.value.length > 0
                ? Math.max(...posts.value.map((p) => p.no)) + 1
                : 1;
            // 새 글은 리스트 상단에 추가
            posts.value.unshift({
              no: newNo,
              title: newPost.value.title,
              content: newPost.value.content,
            });
            // 입력창 초기화
            newPost.value.title = "";
            newPost.value.content = "";
          };

          // 2. 게시글 수정
          const startEdit = (post) => {
            editingPostNo.value = post.no;
            editPost.value.title = post.title;
            editPost.value.content = post.content;
          };

          const saveEdit = (no) => {
            if (
              !editPost.value.title.trim() ||
              !editPost.value.content.trim()
            ) {
              alert("수정할 제목과 내용을 올바르게 입력해주세요!");
              return;
            }
            // target 지금 수정한 반응형 데이터 (posts에서 선택된 post)
            const target = posts.value.find((p) => p.no === no);
              target.title = editPost.value.title;
              target.content = editPost.value.content; // 저장
            editingPostNo.value = null; // 읽기 모드로 복귀
          };

          const cancelEdit = () => {
            editingPostNo.value = null;
          };

          // 3. 게시글 삭제
          const deletePost = (no) => {
            if (confirm("정말로 삭제하시겠습니까?")) {
              posts.value = posts.value.filter((p) => p.no !== no);
              if (selectedPostNo.value === no) {
                closePost();
              }
            }
          };

          return {
            posts,
            sortedPosts,
            selectedPostNo,
            togglePost,
            closePost,
            newPost,
            addPost,
            editingPostNo,
            editPost,
            startEdit,
            saveEdit,
            cancelEdit,
            deletePost,
          };
        },
      }).mount("#app");
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>
